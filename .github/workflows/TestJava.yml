name: Java CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build with Ant
      run: ant -Dplatforms.JDK_17.home=$JAVA_HOME -Dlibs.json-simple.classpath=lib/json-simple-1.1.1.jar test
