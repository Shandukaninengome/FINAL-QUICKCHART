name: Java CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Download JUnit jars
      run: |
        mkdir -p lib
        curl -L -o lib/junit-jupiter-api-5.10.3.jar https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-api/5.10.3/junit-jupiter-api-5.10.3.jar
        curl -L -o lib/junit-jupiter-engine-5.10.3.jar https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-engine/5.10.3/junit-jupiter-engine-5.10.3.jar
        curl -L -o lib/junit-platform-launcher-1.10.3.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-launcher/1.10.3/junit-platform-launcher-1.10.3.jar
        curl -L -o lib/opentest4j-1.3.0.jar https://repo1.maven.org/maven2/org/opentest4j/opentest4j/1.3.0/opentest4j-1.3.0.jar
        curl -L -o lib/junit-jupiter-params-5.10.3.jar https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-params/5.10.3/junit-jupiter-params-5.10.3.jar
    - name: Build with Ant
      run: ant -Dplatforms.JDK_17.home=$JAVA_HOME test
