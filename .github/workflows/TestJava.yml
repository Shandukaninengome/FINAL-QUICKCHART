name: Java CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Download dependencies
      run: |
        mkdir -p lib
        curl -L -o lib/json-simple.jar https://repo1.maven.org/maven2/com/googlecode/json-simple/json-simple/1.1.1/json-simple-1.1.1.jar
        curl -L -o lib/junit-platform-console.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.3/junit-platform-console-standalone-1.10.3.jar
    - name: Compile
      run: |
        mkdir -p out
        javac -cp lib/json-simple.jar:lib/junit-platform-console.jar -d out $(find src -name "*.java") $(find test -name "*.java")
    - name: Run Tests
      run: |
        java -jar lib/junit-platform-console.jar --class-path out --scan-class-path
